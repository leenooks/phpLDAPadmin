name: Create Docker Image
run-name: ${{ gitea.actor }} Building Docker Image 🐳
on:
  push:
    branches:
      - '2.*-dev'
    tags:
      - '2.*'
env:
  VERSION: ${{ gitea.ref_name == 'master' && 'latest' || gitea.ref_name }}

jobs:
  test:
    strategy:
      matrix:
        arch:
        - x86_64
        # arm64

    name: Test Application
    runs-on: docker-${{ matrix.arch }}
    container:
      image: docker:cli
      privileged: false

    steps:
    - name: Environment Setup
      run: |
        # If we have a proxy use it
        if [ -n "${HTTP_PROXY}" ]; then echo "HTTP PROXY [${HTTP_PROXY}]"; sed -i -e s'/https/http/' /etc/apk/repositories; fi
        # Some pre-reqs
        apk add git nodejs npm tar zstd
        ## Some debugging info
        # env|sort

    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Build Assets
      run: |
        # Build assets
        npm i
        npm run prod

    - name: Cache page assets
      id: cache-page-assets
      uses: actions/cache@v6
      with:
        path: |
          public/css/app.css
          public/fonts
          public/images
          public/js/app.js
          public/js/manifest.js
          public/js/vendor.js
        key: pla-page-assets-${{ env.GITHUB_SHA }}

  build:
    strategy:
      matrix:
        arch:
        - x86_64
        - arm64
    needs: [test]

    name: Build Docker Image
    runs-on: docker-${{ matrix.arch }}
    container:
      image: docker:dind
      privileged: true
    env:
      ARCH: ${{ matrix.arch }}
      VERSIONARCH: ${{ env.VERSION }}-${{ env.ARCH }}
      DOCKER_HOST: tcp://127.0.0.1:2375

    steps:
    - name: Environment Setup
      run: |
        # If we have a proxy use it
        if [ -n "${HTTP_PROXY}" ]; then echo "HTTP PROXY [${HTTP_PROXY}]"; sed -i -e s'/https/http/' /etc/apk/repositories; fi
        # Some pre-reqs
        apk add git curl nodejs npm tar zstd
        # Start docker
        dockerd --host=tcp://127.0.0.1:2375 --tls=false &
        until docker info > /dev/null 2>&1; do echo "Waiting for docker..."; sleep 1; done
        # Some debugging info
        # docker info && docker version
        # env|sort

    - name: Registry FQDN Setup
      id: registry
      run: |
        registry=${{ github.server_url }}
        echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

    - name: Container Registry Login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.registry.outputs.registry }}
        username: ${{ gitea.actor }}
        password: ${{ secrets.PKG_WRITE_TOKEN }}

    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Cache page assets
      id: cache-page-assets
      uses: actions/cache@v6
      with:
        path: |
          public/css/app.css
          public/fonts
          public/images
          public/js/app.js
          public/js/manifest.js
          public/js/vendor.js
        key: pla-page-assets-${{ env.GITHUB_SHA }}
        fail-on-cache-miss: true

    - name: Record version and Delete Unnecessary files
      id: prebuild
      run: |
        echo ${GITHUB_SHA::8} > VERSION
        rm -rf .git* tests/ storage/app/test/
        cat VERSION public/VERSION

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: "${{ steps.registry.outputs.registry }}/${{ env.GITHUB_REPOSITORY }}:${{ env.VERSIONARCH }}"
        build-args: |
          BUILD_REVISION=${{ env.GITHUB_SHA }}
          BUILD_VERSION=v${{ env.GITHUB_REF_NAME }}

  manifest:
    name: Final Docker Image Manifest
    runs-on: docker-x86_64
    container:
      image: docker:cli
      privileged: false
    needs: [build]

    steps:
    - name: Environment Setup
      run: |
        # If we have a proxy use it
        if [ -n "${HTTP_PROXY}" ]; then echo "HTTP PROXY [${HTTP_PROXY}]"; sed -i -e s'/https/http/' /etc/apk/repositories; fi
        # Some pre-reqs
        apk add git curl nodejs

    - name: Registry FQDN Setup
      id: registry
      run: |
        registry=${{ github.server_url }}
        echo "registry=${registry##http*://}" >> "$GITHUB_OUTPUT"

    - name: Container Registry Login
      uses: docker/login-action@v3
      with:
        registry: ${{ steps.registry.outputs.registry }}
        username: ${{ gitea.actor }}
        password: ${{ secrets.PKG_WRITE_TOKEN }}

    - name: Build Docker Manifest
      run: |
        docker buildx imagetools create \
          --tag ${{ steps.registry.outputs.registry }}/${{ env.GITHUB_REPOSITORY }}:${{ env.VERSION }} \
          ${{ steps.registry.outputs.registry }}/${{ env.GITHUB_REPOSITORY }}:${{ env.VERSION }}-x86_64 \
          ${{ steps.registry.outputs.registry }}/${{ env.GITHUB_REPOSITORY }}:${{ env.VERSION }}-arm64
        echo "Built container: ${{ steps.registry.outputs.registry }}/${{ env.GITHUB_REPOSITORY }}:${{ env.VERSION }}"
